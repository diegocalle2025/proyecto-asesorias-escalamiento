name: CI/CD Asesorias Escalamiento

on:
  push:
    branches: [ "master" ] # Se activa al subir código a la rama master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Construir y subir imagen del Monolito
      run: |
        docker build -t dcalle2026/monolito-asesorias:latest .
        docker push dcalle2026/monolito-asesorias:latest

    - name: Construir y subir imagen del Microservicio
      run: |
        docker build -t dcalle2026/microservicio-proyectos:latest ./microservicio-proyectos
        docker push dcalle2026/microservicio-proyectos:latest
